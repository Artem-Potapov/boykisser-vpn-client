name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xray-go/go.mod

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Build xray.aar
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.1.8937393
          XRAY_CORE_REF: main
        run: |
          chmod +x scripts/build-xray-aar.bash
          ./scripts/build-xray-aar.bash

      - name: Build, test, and lint
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            app/libs/xray.aar
            app/build/outputs/apk/debug/*.apk
            app/build/reports/tests/testDebugUnitTest/**
            app/build/reports/lint-results-debug.html
